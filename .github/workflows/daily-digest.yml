name: Daily digest

# 08:00 Asia/Taipei == 00:00 UTC. GitHub cron is UTC-only.
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch: {}

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Hit the cron endpoint
        run: |
          code=$(curl -sS -o /tmp/out.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_BASE_URL }}/api/cron")
          echo "HTTP $code"
          cat /tmp/out.json
          test "$code" = "200"
